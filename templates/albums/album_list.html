{% extends 'base.html' %}

{% block content %}

<h2>My Albums</h2>

<a href="{% url 'album-create' %}" class="btn btn-success mb-3">
    Create Album
</a>

<div class="row">

{% for album in object_list %}

<div class="col-md-4">
    <div class="card mb-3">

        <div class="card-body">
            <h5>{{ album.title }}</h5>

            <p>{{ album.description }}</p>

            <a href="{% url 'album-detail' album.id %}" class="btn btn-primary">
                View
            </a>
        </div>

    </div>
</div>

{% endfor %}

</div>

{% endblock %}
